<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Attic">
  
  <title>Attic</title>
  
  <link rel="manifest" href="/m/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="/m/mobile.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="default">

  <!-- Top Bar -->
  <header class="top-bar">
    <div class="top-bar-left" id="top-bar-left"></div>
    <div class="top-bar-center" id="top-bar-title">Attic</div>
    <div class="top-bar-right" id="top-bar-right"></div>
  </header>

  <!-- Main Content Area -->
  <main class="content-area" id="main-content">
    
    <!-- Home View -->
    <div id="view-home" class="view active">
      <div class="partner-status-strip">
        <div class="partner-status-inner">
          <div class="avatar-col">
            <div class="avatar my-avatar" id="home-my-avatar"></div>
            <div class="name-label" id="home-my-name">You</div>
          </div>
          <div class="heart-connector">
            <i data-lucide="heart"></i>
          </div>
          <div class="avatar-col">
            <div class="avatar partner-avatar" id="home-partner-avatar"></div>
            <div class="name-label" id="home-partner-name">Partner</div>
            <div class="status-label" id="home-partner-status">Loading...</div>
          </div>
        </div>
      </div>

      <div class="together-timer" id="together-timer">
        --
      </div>

      <div class="kiss-section">
        <button id="btn-kiss" class="btn-kiss">
          <i data-lucide="heart" class="kiss-icon"></i>
          <span>Send a kiss</span>
        </button>
        <div class="last-kiss-label" id="last-kiss-label"></div>
      </div>

      <div class="pet-widget skeleton" id="pet-widget">
        <!-- Pet content injected via JS -->
      </div>

      <div class="stats-row">
        <div class="stat-card skeleton" id="stat-days"></div>
        <div class="stat-card skeleton" id="stat-streak"></div>
      </div>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view">
      <div class="message-list" id="message-list"></div>
      <div class="chat-input-bar" id="chat-input-bar">
        <button class="btn-icon"><i data-lucide="plus"></i></button>
        <input type="text" id="chat-input" placeholder="Message..." autocomplete="off">
        <button class="btn-icon send-btn" id="btn-send-chat"><i data-lucide="send"></i></button>
      </div>
    </div>

    <!-- Arcade View -->
    <div id="view-arcade" class="view">
      <div class="syncwatcher-card" id="syncwatcher-card">
        <div class="sw-content">
          <i data-lucide="monitor-play" class="sw-icon"></i>
          <h3>Watch together</h3>
          <button class="btn-primary">Start a session</button>
        </div>
      </div>
      <div class="games-grid">
        <div class="game-card">
          <div class="game-thumb bg-matcha"></div>
          <div class="game-name">Tic Tac Toe</div>
          <div class="game-tag">2 players</div>
        </div>
        <div class="game-card">
          <div class="game-thumb bg-rose"></div>
          <div class="game-name">Pictionary</div>
          <div class="game-tag">2 players</div>
        </div>
      </div>
    </div>

    <!-- Space View -->
    <div id="view-space" class="view">
      <div class="feature-list">
        <div class="feature-row">
          <div class="feature-icon bg-accent"><i data-lucide="image"></i></div>
          <div class="feature-text">
            <div class="feature-title">Scrapbook</div>
            <div class="feature-desc">Shared photo album</div>
          </div>
          <i data-lucide="chevron-right" class="chevron"></i>
        </div>
        <div class="feature-row">
          <div class="feature-icon bg-accent"><i data-lucide="file-text"></i></div>
          <div class="feature-text">
            <div class="feature-title">Notes</div>
            <div class="feature-desc">Shared lists & ideas</div>
          </div>
          <i data-lucide="chevron-right" class="chevron"></i>
        </div>
        <div class="feature-row">
          <div class="feature-icon bg-accent"><i data-lucide="calendar"></i></div>
          <div class="feature-text">
            <div class="feature-title">Calendar</div>
            <div class="feature-desc">Upcoming dates</div>
          </div>
          <i data-lucide="chevron-right" class="chevron"></i>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <div class="profile-header">
        <div class="avatar-large" id="settings-my-avatar"></div>
        <div class="settings-name" id="settings-my-name">You</div>
        <div class="settings-tag" id="settings-partner-tag">With Partner ♥</div>
        <button class="btn-outline btn-edit-profile">Edit Profile</button>
      </div>

      <div class="settings-section-title">APPEARANCE</div>
      <div class="feature-list">
        <div class="feature-row" id="row-theme">
          <div class="feature-icon theme-icon"><i data-lucide="palette"></i></div>
          <div class="feature-text">
            <div class="feature-title">Theme</div>
          </div>
          <div class="settings-value" id="current-theme-label">Default</div>
          <i data-lucide="chevron-right" class="chevron"></i>
        </div>
      </div>
      
      <div class="settings-section-title">ACCOUNT</div>
      <div class="feature-list">
        <div class="feature-row" id="btn-logout">
          <div class="feature-icon text-danger"><i data-lucide="log-out"></i></div>
          <div class="feature-text">
            <div class="feature-title text-danger">Log Out</div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#home" class="nav-tab active" data-target="home">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="#chat" class="nav-tab" data-target="chat">
      <i data-lucide="message-square"></i>
      <span>Chat</span>
    </a>
    <a href="#arcade" class="nav-tab" data-target="arcade">
      <i data-lucide="gamepad-2"></i>
      <span>Arcade</span>
    </a>
    <a href="#space" class="nav-tab" data-target="space">
      <i data-lucide="layout-grid"></i>
      <span>Space</span>
    </a>
    <a href="#settings" class="nav-tab" data-target="settings">
      <div class="nav-avatar" id="nav-my-avatar"></div>
    </a>
  </nav>

  <script type="module" src="/m/app.js"></script>
</body>
</html>
